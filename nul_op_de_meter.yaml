blueprint:
  name: Nul op de Meter - Solis Thuisbatterij
  description: >
    Houdt het netverbruik binnen ±300 W ("nul op de meter") door de thuisbatterij
    dynamisch te laden en ontladen op basis van het actuele netvermogen.

    - Primair doel: netverbruik tussen -300 W en +300 W houden.
    - Harde SOC-ondergrens van 20% voor nachtverbruik.
    - EV-blokker: bij hoog EV-verbruik stopt de batterij met laden/ontladen.
    - Aansturing via Solis RC Force Charge/Discharge selector.
    - Idempotent: alleen schrijven bij echte wijzigingen; uitgebreide debug-logging.
  domain: automation

  input:
    # ---- Sensors (verplicht) ----
    sensor_soc:
      name: "Batterij SOC (%)"
      description: "Bijv.: sensor.thuisbatterij_percentage"
      default: sensor.thuisbatterij_percentage
      selector: { entity: { domain: sensor } }

    sensor_house_power:
      name: "Net-/huisvermogenssensor (W/kW)"
      description: "Positief = afname (import), negatief = export (teruglevering). Bijv.: sensor.stroomverbruik"
      default: sensor.stroomverbruik
      selector: { entity: { domain: sensor } }

    # ---- Actuators (verplicht) ----
    select_force_mode:
      name: "Solis RC Force Charge/Discharge selector"
      description: "Bijv.: select.rc_force_charge_discharge"
      default: select.rc_force_charge_discharge
      selector: { entity: { domain: select } }

    number_charge_power:
      name: "Max charge power (W)"
      description: "Bijv.: number.thuisbatterij_max_charge_power"
      default: number.thuisbatterij_max_charge_power
      selector: { entity: { domain: number } }

    number_discharge_power:
      name: "Max discharge power (W)"
      description: "Bijv.: number.thuisbatterij_max_discharge_power"
      default: number.thuisbatterij_max_discharge_power
      selector: { entity: { domain: number } }

    # ---- Nul op de meter drempel ----
    grid_deadband_w:
      name: "Nul-op-de-meter bandbreedte (W)"
      description: "Acceptabele afwijking van 0 W. Batterij grijpt in buiten +/- deze waarde."
      default: 300
      selector:
        number: {min: 50, max: 1000, step: 50, unit_of_measurement: "W", mode: slider}

    # ---- SOC grenzen ----
    soc_hard_min:
      name: "Harde SOC-ondergrens (%)"
      description: "Nooit ontladen onder deze SOC. Reserve voor nachtverbruik."
      default: 20
      selector:
        number: {min: 5, max: 50, step: 5, unit_of_measurement: "%", mode: slider}

    # ---- Maximaal vermogen ----
    max_charge_power:
      name: "Maximaal laadvermogen (W)"
      description: "Bovengrens voor dynamisch laden."
      default: 8000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    max_discharge_power:
      name: "Maximaal ontlaadvermogen (W)"
      description: "Bovengrens voor dynamisch ontladen."
      default: 6000
      selector:
        number: {min: 0, max: 10000, step: 100, unit_of_measurement: "W", mode: slider}

    # ---- EV-verbruik-blokker (optioneel) ----
    sensor_block_discharge:
      name: "Blokker verbruikssensor (W) (bijv. EV-laadpaal)"
      default: sensor.charge_laadstation_kwh_charge_point_power
      selector: { entity: { domain: sensor } }

    block_discharge_threshold_w:
      name: "Blokker-drempel (W) -- vanaf dit verbruik geen laden/ontladen door batterij"
      description: "Zet 0 om de blokker uit te schakelen."
      default: 0
      selector:
        number: {min: 0, max: 20000, step: 50, unit_of_measurement: "W", mode: slider}

variables:
  v_soc: !input sensor_soc
  v_house_pwr: !input sensor_house_power

  v_select_force: !input select_force_mode
  v_num_charge: !input number_charge_power
  v_num_discharge: !input number_discharge_power

  v_deadband: !input grid_deadband_w
  v_soc_min: !input soc_hard_min
  v_max_charge: !input max_charge_power
  v_max_discharge: !input max_discharge_power

  v_block_sensor: !input sensor_block_discharge
  v_block_threshold: !input block_discharge_threshold_w

  # Solis mode waarden
  mode_none: "None"
  mode_charge: "Solis RC Force Battery Charge"
  mode_discharge: "Solis RC Force Battery Discharge"

trigger:
  - platform: state
    entity_id:
      - !input sensor_soc
      - !input sensor_house_power
    for: "00:00:10"
  - platform: time_pattern
    minutes: "/2"

condition: []

action:
  # 1) Lees actuele waarden
  - variables:
      soc: "{{ states(v_soc) | float(0) }}"
      cur_mode: "{{ states(v_select_force) }}"
      cur_charge: "{{ states(v_num_charge) | float(0) }}"
      cur_discharge: "{{ states(v_num_discharge) | float(0) }}"

      # Netvermogen in Watt (positief = import, negatief = export)
      grid_w: >-
        {% set raw = states(v_house_pwr) %}
        {% set p = raw | float(0) %}
        {% set unit = (state_attr(v_house_pwr, 'unit_of_measurement') | default('', true) | lower) %}
        {% if unit in ['kw'] %}
          {{ p * 1000 }}
        {% elif (p | abs) < 50 %}
          {{ p * 1000 }}
        {% else %}
          {{ p }}
        {% endif %}

  # 2) EV-blokker
  - variables:
      block_ev: >-
        {% if v_block_sensor in ['', None] %}
          false
        {% else %}
          {% set ev = states(v_block_sensor) | float(0) %}
          {% set thr = v_block_threshold | float(0) %}
          {{ ev >= thr and thr > 0 }}
        {% endif %}

  # 3) Bepaal targets: nul-op-de-meter
  #
  #    Compenseer voor wat de batterij nu al doet:
  #    grid_w is het NET-resultaat inclusief batterij, dus het werkelijke
  #    huisverbruik/PV-overschot = grid_w + huidige ontlading - huidige lading.
  #
  #    - real_demand > +deadband  -> ontladen (huis verbruikt meer dan PV levert)
  #    - real_demand < -deadband  -> laden (PV levert meer dan huis verbruikt)
  #    - binnen bandbreedte       -> niets doen (mode: None)
  - variables:
      real_demand: >-
        {% set g = grid_w | float(0) %}
        {% set cd = cur_discharge | float(0) if cur_mode == mode_discharge else 0 %}
        {% set cc = cur_charge | float(0) if cur_mode == mode_charge else 0 %}
        {{ g + cd - cc }}

      target_mode: >-
        {% set rd = real_demand | float(0) %}
        {% set deadband = v_deadband | float(300) %}
        {% set soc_min = v_soc_min | float(20) %}

        {% if block_ev %}
          {{ mode_none }}
        {% elif rd > deadband and soc > soc_min %}
          {{ mode_discharge }}
        {% elif rd < (deadband * -1) and soc < 100 %}
          {{ mode_charge }}
        {% else %}
          {{ mode_none }}
        {% endif %}

      target_power: >-
        {% set rd = real_demand | float(0) %}
        {% set deadband = v_deadband | float(300) %}
        {% set max_chg = v_max_charge | float(8000) %}
        {% set max_dis = v_max_discharge | float(6000) %}
        {% set soc_min = v_soc_min | float(20) %}

        {% if block_ev %}
          0
        {% elif rd > deadband and soc > soc_min %}
          {{ [[rd | round(0) | int, 0] | max, max_dis] | min }}
        {% elif rd < (deadband * -1) and soc < 100 %}
          {{ [[(rd | abs) | round(0) | int, 0] | max, max_chg] | min }}
        {% else %}
          0
        {% endif %}

  # Debug logging
  - service: system_log.write
    data:
      level: info
      message: >
        [Nul-op-de-meter] grid={{ grid_w }}W, real_demand={{ real_demand }}W,
        soc={{ soc }}%, block_ev={{ block_ev }},
        target: mode={{ target_mode }}, power={{ target_power }}W,
        current: mode={{ cur_mode }}, charge={{ cur_charge }}W, discharge={{ cur_discharge }}W

  # 4) Niets gewijzigd? Stoppen zonder service-calls
  - choose:
      - conditions: >-
          {% set tm = target_mode | string %}
          {% set tp = target_power | float(0) %}
          {% if tm == mode_none %}
            {{ cur_mode == mode_none }}
          {% elif tm == mode_charge %}
            {{ cur_mode == mode_charge and cur_charge == tp }}
          {% elif tm == mode_discharge %}
            {{ cur_mode == mode_discharge and cur_discharge == tp }}
          {% else %}
            false
          {% endif %}
        sequence:
          - stop: "Geen wijzigingen nodig."

    default:
      # 5) Zet mode en vermogen
      #    Bij wisseling van richting: eerst mode op None, dan vermogen, dan nieuwe mode.
      #    Dit voorkomt dat de inverter kort met het oude vermogen in de nieuwe richting draait.
      - choose:
          # Wisseling van charge <-> discharge: tussenstap via None
          - conditions: >-
              {{ (cur_mode == mode_charge and target_mode == mode_discharge)
                 or (cur_mode == mode_discharge and target_mode == mode_charge) }}
            sequence:
              - service: select.select_option
                target: { entity_id: !input select_force_mode }
                data: { option: "{{ mode_none }}" }
              - delay: { seconds: 2 }
              - choose:
                  - conditions: "{{ target_mode == mode_charge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_charge_power }
                        data: { value: "{{ target_power }}" }
                  - conditions: "{{ target_mode == mode_discharge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_discharge_power }
                        data: { value: "{{ target_power }}" }
              - service: select.select_option
                target: { entity_id: !input select_force_mode }
                data: { option: "{{ target_mode }}" }

          # Zelfde richting of van/naar None: direct instellen
          - conditions: "{{ target_mode != mode_none }}"
            sequence:
              - choose:
                  - conditions: "{{ target_mode == mode_charge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_charge_power }
                        data: { value: "{{ target_power }}" }
                  - conditions: "{{ target_mode == mode_discharge }}"
                    sequence:
                      - service: number.set_value
                        target: { entity_id: !input number_discharge_power }
                        data: { value: "{{ target_power }}" }
              - choose:
                  - conditions: "{{ cur_mode != target_mode }}"
                    sequence:
                      - service: select.select_option
                        target: { entity_id: !input select_force_mode }
                        data: { option: "{{ target_mode }}" }

        # Target is None: zet mode op None
        default:
          - service: select.select_option
            target: { entity_id: !input select_force_mode }
            data: { option: "{{ mode_none }}" }

mode: single
